---
# ============================================================
# Oracle Inventory
# ============================================================
# This is a skeleton inventory for local testing and reference.
# In production, AAP uses its own inventory source (dynamic or
# static). This file can be replaced by a dynamic inventory
# plugin or AAP inventory sync.
#
# Each host must belong to:
#   - Exactly ONE environment group (dev, staging, prod)
#   - Exactly ONE topology group (rac, standalone, dataguard)
# ============================================================

all:
  children:
    # --- Environment groups (mutually exclusive) ---
    dev:
      hosts:
        oradev-node-1:
    staging:
      hosts:
        orastg-node-1:
    prod:
      hosts:
        oraprd-node-1:
        oraprd-node-2:

    # --- Topology groups (mutually exclusive) ---
    rac:
      hosts:
        oraprd-node-1:
        oraprd-node-2:
    standalone:
      hosts:
        oradev-node-1:
        orastg-node-1:
    dataguard: {}

---
# ============================================================
# Oracle Global Defaults
# ============================================================
# Standard paths, OS users, Oracle Home definitions, and
# global database defaults. These apply to ALL environments.
# ============================================================

# Standard paths - mirrors collection's default_vars_only role
oracle_base: /oracle/u01
oracle_install_dir_root: "{{ oracle_base }}"
oracle_install_dir_temp: "{{ oracle_base }}/tmp"
oracle_install_dir_base: "{{ oracle_base }}/base"
oracle_install_dir_prod: "{{ oracle_base }}/product"
oracle_inventory_location: "{{ oracle_base }}/oraInventory"

# OS user/group - matches collection conventions
oracle_os_user: oracle
oracle_os_uid: 800
oracle_os_group: oinstall
oracle_os_groups:
  - { group: oinstall, gid: 800 }
  - { group: dba, gid: 801 }
  - { group: oper, gid: 802 }
  - { group: asmadmin, gid: 803 }
  - { group: asmdba, gid: 804 }
  - { group: asmoper, gid: 805 }

# Oracle Home definitions - catalog files reference these by name.
# Adding a new patched home = add an entry here, no catalog files change.
# NOTE: This section may be updated automatically by catalog_updater
# after FPP patching. New entries are appended below existing ones.
oracle_homes:
  db_19_21:
    version: "19.21.0.0"
    path: "{{ oracle_install_dir_prod }}/19.21.0.0"
    edition: EE
  db_19_23:
    version: "19.23.0.0"
    path: "{{ oracle_install_dir_prod }}/19.23.0.0"
    edition: EE
  db_21_3:
    version: "21.3.0.0"
    path: "{{ oracle_install_dir_prod }}/21.3.0.0"
    edition: EE

# Target oracle_home for patching convergence.
# All databases should converge to this home. The FPP patching roles
# automatically identify databases not yet on this home and patch them.
# When a new quarterly patch is released:
#   1. Add the new home entry to oracle_homes above
#   2. Update oracle_home_target to the new key
#   3. Run fpp_patch.yml in prepare mode, then patch mode
oracle_home_target: db_19_23

# FPP gold image naming convention.
# The gold image name is derived from the target home key:
#   {{ oracle_home_target }}{{ fpp_gold_image_suffix }}
# Example: oracle_home_target=db_19_23, suffix=_gold → gold image = db_19_23_gold
fpp_gold_image_suffix: "_gold"

# Default database options (minimalist baseline)
oracle_db_options_default:
  JSERVER: false
  ORACLE_TEXT: false
  IMEDIA: false
  CWMLITE: false
  SPATIAL: false
  OMS: false
  APEX: false
  DV: false

# Global defaults
oracle_default_characterset: AL32UTF8
oracle_default_national_characterset: AL16UTF16
oracle_default_storage_type: ASM
oracle_default_diskgroup: XDATA

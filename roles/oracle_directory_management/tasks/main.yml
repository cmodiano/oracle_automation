---
# oracle_directory_management - Manage Oracle DIRECTORY objects per PDB.
#
# Requires: oracle_databases fact from catalog_loader
# Uses: ibre5041.ansible_oracle_modules.oracle_directory

- name: Manage directories for each database
  ansible.builtin.include_tasks: manage_directories_for_db.yml
  loop: "{{ oracle_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  when:
    - _db._is_first_node
    - _db._db_role != 'physical_standby'
  tags: [directories]

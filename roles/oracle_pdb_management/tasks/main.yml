---
# oracle_pdb_management - Create, open, close, or drop PDBs per the catalog.
#
# Requires: oracle_databases fact from catalog_loader
# Uses: ibre5041.ansible_oracle_modules.oracle_pdb

- name: Manage PDBs for each database
  ansible.builtin.include_tasks: manage_pdbs_for_db.yml
  loop: "{{ oracle_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  when:
    - _db._is_first_node
    - _db._db_role != 'physical_standby'
    - _db.cdb | default(true)
    - _db.pdbs is defined
  tags: [pdbs]

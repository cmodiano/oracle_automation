---
# Apply all attribute/value pairs for a single profile.
# Called by profiles_for_db.yml and profiles_per_pdb.yml.
#
# Required variables:
#   _db              : database dict
#   _profile_entry   : dict item from dict2items (key=profile_name, value={attr_dict})
#   _profile_svc     : service_name to connect to (CDB name)
# Optional variables:
#   _profile_ctr     : session_container (PDB name; omit for CDB root / non-CDB)

- name: "Profile {{ _profile_entry.key }}: {{ _attr.key }} = {{ _attr.value }}"
  ibre5041.ansible_oracle_modules.oracle_profile:
    mode: sysdba
    service_name: "{{ _profile_svc }}"
    session_container: "{{ _profile_ctr | default(omit) }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    name: "{{ _profile_entry.key }}"
    attribute_name: "{{ _attr.key }}"
    attribute_value: "{{ _attr.value }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _profile_entry.value | dict2items }}"
  loop_control:
    loop_var: _attr
    label: "{{ _profile_entry.key }}.{{ _attr.key }}"

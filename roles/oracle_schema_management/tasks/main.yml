---
# oracle_schema_management - Manage profiles, roles, users, and grants per PDB.
#
# Executed in strict dependency order:
#   1. Profiles (must exist before users reference them)
#   2. Roles (must exist before users are granted them)
#   3. Users (reference profiles and tablespaces)
#   4. Grants (reference users and roles)
#
# Requires: oracle_databases fact from catalog_loader
# Uses: ibre5041.ansible_oracle_modules.oracle_profile
#       ibre5041.ansible_oracle_modules.oracle_role
#       ibre5041.ansible_oracle_modules.oracle_user
#       ibre5041.ansible_oracle_modules.oracle_grant
#       ibre5041.ansible_oracle_modules.oracle_privs

- name: Manage schemas for each database
  ansible.builtin.include_tasks: manage_schemas_for_db.yml
  loop: "{{ oracle_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  when:
    - _db._is_first_node
    - _db._db_role != 'physical_standby'
  tags: [schemas]

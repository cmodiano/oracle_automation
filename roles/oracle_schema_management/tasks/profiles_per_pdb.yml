---
# Manage profiles for one PDB (or non-CDB root).
# Variables: _db, _pdb_item (key=pdb_name or db_name for non-CDB, value=pdb config)
#
# Connection model:
#   CDB    : service_name=_db.db_name  +  session_container=_pdb_item.key
#   non-CDB: service_name=_db.db_name  (session_container omitted)

# --- Baseline PDB Profiles ---
- name: "Baseline PDB profile {{ _bl_pdb_profile.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_profile:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    session_container: "{{ _pdb_item.key if (_db.cdb | default(true)) else omit }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    name: "{{ _bl_pdb_profile.key }}"
    attribute_name: "{{ _bl_pdb_attr.key }}"
    attribute_value: "{{ _bl_pdb_attr.value }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: >-
    {{ oracle_baseline_accounts.pdb.profiles | default({}) | dict2items
       | subelements('value' | dict2items, skip_missing=True) }}
  loop_control:
    label: "{{ _pdb_item.key }}: {{ _bl_pdb_profile.key }}.{{ _bl_pdb_attr.key }}"
  vars:
    _bl_pdb_profile: "{{ item.0 }}"
    _bl_pdb_attr: "{{ item.1 }}"
  when: oracle_baseline_accounts.pdb.profiles | default({}) | length > 0

# --- Catalog PDB Profiles ---
- name: "PDB profile {{ _pdb_profile.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_profile:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    session_container: "{{ _pdb_item.key if (_db.cdb | default(true)) else omit }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    name: "{{ _pdb_profile.key }}"
    attribute_name: "{{ _pdb_attr.key }}"
    attribute_value: "{{ _pdb_attr.value }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: >-
    {{ _pdb_item.value.profiles | default({}) | dict2items
       | subelements('value' | dict2items, skip_missing=True) }}
  loop_control:
    label: "{{ _pdb_item.key }}: {{ _pdb_profile.key }}.{{ _pdb_attr.key }}"
  vars:
    _pdb_profile: "{{ item.0 }}"
    _pdb_attr: "{{ item.1 }}"
  when: _pdb_item.value.profiles | default({}) | length > 0

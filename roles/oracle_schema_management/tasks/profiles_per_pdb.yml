---
# Manage profiles for one PDB (or non-CDB root).
# Variables: _db, _pdb_item (key=pdb_name or db_name for non-CDB, value=pdb config)
#
# Connection model:
#   CDB    : service_name=_db.db_name  +  session_container=_pdb_item.key
#   non-CDB: service_name=_db.db_name  (session_container omitted)
#
# Delegates to profiles_apply_one.yml per profile (one include per profile)
# because oracle_profile takes one attribute per call and the data structure
# is a dict-of-dicts which cannot be flattened with subelements directly.

# --- Baseline PDB Profiles ---
- name: "Baseline PDB profile {{ _profile_entry.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ansible.builtin.include_tasks: profiles_apply_one.yml
  loop: "{{ ((oracle_baseline_accounts | default({})).pdb | default({})).profiles | default({}) | dict2items }}"
  loop_control:
    loop_var: _profile_entry
    label: "{{ _pdb_item.key }}/{{ _profile_entry.key }}"
  vars:
    _profile_svc: "{{ _db.db_name }}"
    _profile_ctr: "{{ _pdb_item.key if (_db.cdb | default(true)) else omit }}"
  when: ((oracle_baseline_accounts | default({})).pdb | default({})).profiles | default({}) | length > 0

# --- Catalog PDB Profiles ---
- name: "PDB profile {{ _profile_entry.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ansible.builtin.include_tasks: profiles_apply_one.yml
  loop: "{{ _pdb_item.value.profiles | default({}) | dict2items }}"
  loop_control:
    loop_var: _profile_entry
    label: "{{ _pdb_item.key }}/{{ _profile_entry.key }}"
  vars:
    _profile_svc: "{{ _db.db_name }}"
    _profile_ctr: "{{ _pdb_item.key if (_db.cdb | default(true)) else omit }}"
  when: _pdb_item.value.profiles | default({}) | length > 0

---
# Manage schemas for a single PDB.
# Variables: _db (database), _pdb_item (PDB dict item: key=name, value=config)

# --- PDB-level Profiles ---
- name: "Create profile {{ _pdb_profile.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_profile:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    name: "{{ _pdb_profile.key }}"
    attribute_name: "{{ _pdb_profile_attr.key }}"
    attribute_value: "{{ _pdb_profile_attr.value }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.profiles | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_profile
    label: "{{ _pdb_item.key }}/{{ _pdb_profile.key }}"
  vars:
    # Merge standard profile definition with PDB-level overrides
    _merged_profile: >-
      {{ (oracle_standard_profiles[_pdb_profile.key] | default({}))
         | combine(_pdb_profile.value | default({}), recursive=True)
      }}

# --- PDB-level Roles ---
- name: "Manage role {{ _pdb_role.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_role:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    role: "{{ _pdb_role.key }}"
    state: "{{ _pdb_role.value.state | default('present') }}"
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.roles | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_role
    label: "{{ _pdb_item.key }}/{{ _pdb_role.key }}"

# --- PDB-level Users ---
- name: "Manage user {{ _pdb_user.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_user:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _pdb_user.key }}"
    schema_password: >-
      {{ lookup('community.hashi_vault.hashi_vault',
         vault_engine ~ '/data/' ~ _db.db_name ~ '/' ~ _pdb_item.key ~ '/' ~ _pdb_user.key,
         url=vault_addr) | community.hashi_vault.vault_kv2_get('password') }}
    default_tablespace: "{{ _pdb_user.value.default_tablespace | default(omit) }}"
    default_temp_tablespace: "{{ _pdb_user.value.default_temp_tablespace | default('TEMP') }}"
    profile: "{{ _pdb_user.value.profile | default(omit) }}"
    authentication_type: "{{ _pdb_user.value.authentication_type | default('password') }}"
    expired: "{{ _pdb_user.value.expired | default(omit) }}"
    locked: "{{ _pdb_user.value.locked | default(omit) }}"
    state: "{{ _pdb_user.value.state | default('present') }}"
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_user
    label: "{{ _pdb_item.key }}/{{ _pdb_user.key }}"

# --- PDB-level Grants (role grants) ---
- name: "Grant roles to {{ _pdb_grant_user.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_grant:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _pdb_grant_user.key }}"
    grants: "{{ _pdb_grant_user.value.grants.roles | default([]) }}"
    grant_mode: "{{ _pdb_grant_user.value.grants.grant_mode | default('append') }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_grant_user
    label: "{{ _pdb_item.key }}/{{ _pdb_grant_user.key }}"
  when:
    - _pdb_grant_user.value.grants is defined
    - _pdb_grant_user.value.grants.roles is defined
    - _pdb_grant_user.value.state | default('present') == 'present'

# --- PDB-level Grants (system privileges) ---
- name: "Grant system privileges to {{ _pdb_syspriv_user.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_privs:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _pdb_syspriv_user.key }}"
    privs: "{{ _pdb_syspriv_user.value.grants.system_privileges }}"
    privs_type: system
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_syspriv_user
    label: "{{ _pdb_item.key }}/{{ _pdb_syspriv_user.key }}"
  when:
    - _pdb_syspriv_user.value.grants is defined
    - _pdb_syspriv_user.value.grants.system_privileges is defined
    - _pdb_syspriv_user.value.state | default('present') == 'present'

# --- PDB-level Grants (object privileges) ---
- name: "Grant object privileges to {{ _pdb_objpriv_user.key }} in {{ _db.db_name }}/{{ _pdb_item.key }}"
  ibre5041.ansible_oracle_modules.oracle_privs:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _pdb_item.key }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _pdb_objpriv_user.key }}"
    privs: "{{ _pdb_objpriv_user.value.grants.object_privileges }}"
    privs_type: object
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ _pdb_item.value.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _pdb_objpriv_user
    label: "{{ _pdb_item.key }}/{{ _pdb_objpriv_user.key }}"
  when:
    - _pdb_objpriv_user.value.grants is defined
    - _pdb_objpriv_user.value.grants.object_privileges is defined
    - _pdb_objpriv_user.value.state | default('present') == 'present'

---
# Apply baseline accounts to the CDB root of a single database.
# Runs BEFORE catalog-specific items.
# Variable: _db (enriched database dict from catalog_loader)
# Data source: oracle_baseline_accounts.cdb (group_vars/all/baseline_accounts.yml)
# Vault path: oracle-secrets/data/_baseline/{username}

# --- Baseline CDB Profiles ---
- name: "Baseline CDB profile {{ _bl_cdb_profile.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_profile:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    name: "{{ _bl_cdb_profile.key }}"
    attribute_name: "{{ _bl_cdb_attr.key }}"
    attribute_value: "{{ _bl_cdb_attr.value }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: >-
    {{ oracle_baseline_accounts.cdb.profiles | default({}) | dict2items
       | subelements('value' | dict2items, skip_missing=True) }}
  loop_control:
    label: "{{ _db.db_name }}: {{ _bl_cdb_profile.key }}.{{ _bl_cdb_attr.key }}"
  vars:
    _bl_cdb_profile: "{{ item.0 }}"
    _bl_cdb_attr: "{{ item.1 }}"
  when: oracle_baseline_accounts.cdb.profiles | default({}) | length > 0

# --- Baseline CDB Roles ---
- name: "Baseline CDB role {{ _bl_cdb_role.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_role:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    role: "{{ _bl_cdb_role.key }}"
    state: "{{ _bl_cdb_role.value.state | default('present') }}"
  become_user: "{{ oracle_os_user }}"
  loop: "{{ oracle_baseline_accounts.cdb.roles | default({}) | dict2items }}"
  loop_control:
    loop_var: _bl_cdb_role
    label: "{{ _db.db_name }}/{{ _bl_cdb_role.key }}"
  when: oracle_baseline_accounts.cdb.roles | default({}) | length > 0

# --- Baseline CDB Users ---
- name: "Baseline CDB user {{ _bl_cdb_user.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_user:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _bl_cdb_user.key }}"
    schema_password: >-
      {{ lookup('community.hashi_vault.hashi_vault',
         vault_engine ~ '/data/_baseline/' ~ _bl_cdb_user.key,
         url=vault_addr) | community.hashi_vault.vault_kv2_get('password') }}
    profile: "{{ _bl_cdb_user.value.profile | default(omit) }}"
    authentication_type: "{{ _bl_cdb_user.value.authentication_type | default('password') }}"
    expired: "{{ _bl_cdb_user.value.expired | default(omit) }}"
    locked: "{{ _bl_cdb_user.value.locked | default(omit) }}"
    state: "{{ _bl_cdb_user.value.state | default('present') }}"
  become_user: "{{ oracle_os_user }}"
  loop: "{{ oracle_baseline_accounts.cdb.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _bl_cdb_user
    label: "{{ _db.db_name }}/{{ _bl_cdb_user.key }}"
  when: oracle_baseline_accounts.cdb.users | default({}) | length > 0

# --- Baseline CDB Grants (role grants) ---
- name: "Baseline CDB role grants for {{ _bl_cdb_grant_user.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_grant:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _bl_cdb_grant_user.key }}"
    grants: "{{ _bl_cdb_grant_user.value.grants.roles | default([]) }}"
    grant_mode: "{{ _bl_cdb_grant_user.value.grants.grant_mode | default('append') }}"
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ oracle_baseline_accounts.cdb.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _bl_cdb_grant_user
    label: "{{ _db.db_name }}/{{ _bl_cdb_grant_user.key }}"
  when:
    - oracle_baseline_accounts.cdb.users | default({}) | length > 0
    - _bl_cdb_grant_user.value.grants is defined
    - _bl_cdb_grant_user.value.grants.roles is defined
    - _bl_cdb_grant_user.value.state | default('present') == 'present'

# --- Baseline CDB Grants (system privileges) ---
- name: "Baseline CDB system privs for {{ _bl_cdb_syspriv_user.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_privs:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _bl_cdb_syspriv_user.key }}"
    privs: "{{ _bl_cdb_syspriv_user.value.grants.system_privileges }}"
    privs_type: system
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ oracle_baseline_accounts.cdb.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _bl_cdb_syspriv_user
    label: "{{ _db.db_name }}/{{ _bl_cdb_syspriv_user.key }}"
  when:
    - oracle_baseline_accounts.cdb.users | default({}) | length > 0
    - _bl_cdb_syspriv_user.value.grants is defined
    - _bl_cdb_syspriv_user.value.grants.system_privileges is defined
    - _bl_cdb_syspriv_user.value.state | default('present') == 'present'

# --- Baseline CDB Grants (object privileges) ---
- name: "Baseline CDB object privs for {{ _bl_cdb_objpriv_user.key }} on {{ _db.db_name }}"
  ibre5041.ansible_oracle_modules.oracle_privs:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _db._oracle_home_path }}"
    schema: "{{ _bl_cdb_objpriv_user.key }}"
    privs: "{{ _bl_cdb_objpriv_user.value.grants.object_privileges }}"
    privs_type: object
    state: present
  become_user: "{{ oracle_os_user }}"
  loop: "{{ oracle_baseline_accounts.cdb.users | default({}) | dict2items }}"
  loop_control:
    loop_var: _bl_cdb_objpriv_user
    label: "{{ _db.db_name }}/{{ _bl_cdb_objpriv_user.key }}"
  when:
    - oracle_baseline_accounts.cdb.users | default({}) | length > 0
    - _bl_cdb_objpriv_user.value.grants is defined
    - _bl_cdb_objpriv_user.value.grants.object_privileges is defined
    - _bl_cdb_objpriv_user.value.state | default('present') == 'present'

---
# oracle_tablespace_management - Create/modify tablespaces per PDB.
#
# Requires: oracle_databases fact from catalog_loader
# Uses: ibre5041.ansible_oracle_modules.oracle_tablespace

- name: Manage tablespaces for each database
  ansible.builtin.include_tasks: manage_tablespaces_for_db.yml
  loop: "{{ oracle_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  when:
    - _db._is_first_node
    - _db._db_role != 'physical_standby'
    - _db.pdbs is defined
  tags: [tablespaces]

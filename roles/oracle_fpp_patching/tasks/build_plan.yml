---
# Build the patching plan: query actual running homes, compare with
# the declared desired home from catalog, identify databases to patch.
#
# Output facts:
#   _fpp_patch_plan   - list of dicts with: db, desired_home, desired_home_path,
#                       actual_home_path, gold_image
#   _fpp_target_homes - unique list of desired oracle_home names to provision

# --- Query actual running Oracle Home for each database ---

- name: Query actual Oracle Home from oratab
  ansible.builtin.shell: >-
    grep -s "^{{ item.db_name }}:" /etc/oratab | head -1 | cut -d: -f2
  loop: "{{ oracle_databases | default([]) }}"
  loop_control:
    label: "{{ item.db_name }}"
  register: _fpp_actual_home_results
  changed_when: false
  failed_when: false
  become_user: "{{ oracle_os_user }}"
  when: item._is_first_node | default(true)

# --- Build the plan: actual != desired means patching needed ---

- name: Build patch plan from actual vs desired
  ansible.builtin.set_fact:
    _fpp_patch_plan: >-
      {{ _fpp_patch_plan | default([]) + [
           {
             'db': item.item,
             'desired_home': item.item.oracle_home,
             'desired_home_path': item.item._oracle_home_path,
             'actual_home_path': item.stdout | trim,
             'gold_image': (fpp_gold_images | default({}))[item.item.oracle_home]
                           | default(item.item.oracle_home ~ fpp_gold_image_suffix),
           }
         ] }}
  loop: "{{ _fpp_actual_home_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.db_name | default('unknown') }}"
  when:
    - item is not skipped
    - item.stdout is defined
    - item.stdout | trim | length > 0
    - item.stdout | trim != item.item._oracle_home_path

- name: Default empty plan if nothing to patch
  ansible.builtin.set_fact:
    _fpp_patch_plan: "{{ _fpp_patch_plan | default([]) }}"

# --- Validate prerequisite environments ---
# Before patching in staging/prod, verify that the DB is already at
# the target oracle_home in all lower environments (per its host_mapping).
# Databases that don't exist in a lower env skip that check.

- name: Validate prerequisite environments
  ansible.builtin.include_tasks: validate_prerequisites.yml
  when: _fpp_patch_plan | length > 0

# --- Identify unique target homes ---

- name: Identify target homes to provision
  ansible.builtin.set_fact:
    _fpp_target_homes: "{{ _fpp_patch_plan | map(attribute='desired_home') | unique | list }}"

# --- Check which target homes are already installed on this host ---
# A home path present on disk means the working copy was already provisioned
# (prepare phase ran previously, or the home was installed by other means).
# A missing path means FPP prepare must run before patching.

- name: Check target home paths on this host
  ansible.builtin.stat:
    path: "{{ oracle_homes[_target_home].path }}"
    get_attributes: false
    get_checksum: false
    get_mime: false
  loop: "{{ _fpp_target_homes }}"
  loop_control:
    loop_var: _target_home
  register: _fpp_home_stat_results

- name: Classify target homes by installation status
  ansible.builtin.set_fact:
    _fpp_homes_ready: >-
      {{ _fpp_home_stat_results.results
         | selectattr('stat.exists', 'equalto', true)
         | map(attribute='_target_home')
         | list }}
    _fpp_homes_to_prepare: >-
      {{ _fpp_home_stat_results.results
         | selectattr('stat.exists', 'equalto', false)
         | map(attribute='_target_home')
         | list }}

# --- Display plan ---

- name: Display patching plan
  ansible.builtin.debug:
    msg: |
      Patching plan for {{ inventory_hostname }}:
      {% for home in _fpp_target_homes %}
        Target home: {{ home }} ({{ oracle_homes[home].version }})
          Status:     {{ 'installed — patch direct' if home in _fpp_homes_ready else 'NOT installed — FPP prepare required' }}
          Gold image: {{ (_fpp_patch_plan | selectattr('desired_home', 'equalto', home) | first).gold_image }}
          Databases:
          {% for entry in _fpp_patch_plan | selectattr('desired_home', 'equalto', home) %}
            - {{ entry.db.db_name }}: {{ entry.actual_home_path }} → {{ entry.desired_home_path }}
          {% endfor %}
      {% endfor %}
  when: _fpp_patch_plan | length > 0

- name: Skip host if nothing to patch
  ansible.builtin.debug:
    msg: "All databases on {{ inventory_hostname }} are already on their desired Oracle Home. Nothing to do."
  when: _fpp_patch_plan | length == 0

- name: End host if nothing to patch
  ansible.builtin.meta: end_host
  when: _fpp_patch_plan | length == 0

---
# FPP Prepare phase - Run BEFORE the maintenance window.
#
# This phase:
#   1. Validates the gold image exists
#   2. Provisions a new working copy (installs the new Oracle Home)
#   3. Runs pre-checks (conflict detection, space verification)
#   4. Reports the working copy name and path for the patch phase
#
# No database downtime is incurred during this phase.

- name: Validate prepare inputs
  ansible.builtin.assert:
    that:
      - fpp_gold_image | length > 0
      - oracle_home_old | length > 0
      - oracle_home_new | length > 0
      - oracle_homes[oracle_home_old] is defined
    fail_msg: >-
      FPP prepare requires fpp_gold_image, oracle_home_old,
      oracle_home_new. oracle_home_old must exist in oracle_homes dict.

- name: Resolve old oracle_home path
  ansible.builtin.set_fact:
    _fpp_old_home_path: "{{ oracle_home_old | resolve_oracle_home(oracle_homes) }}"

- name: Identify databases on old oracle_home for this host
  ansible.builtin.set_fact:
    _fpp_databases: >-
      {{ oracle_databases | default([])
         | selectattr('_oracle_home_path', 'equalto', _fpp_old_home_path)
         | list }}

- name: Display databases that will be patched
  ansible.builtin.debug:
    msg: >-
      Found {{ _fpp_databases | length }} database(s) on {{ oracle_home_old }}:
      {{ _fpp_databases | map(attribute='db_name') | join(', ') }}

- name: Skip host if no databases to patch
  ansible.builtin.meta: end_host
  when: _fpp_databases | length == 0

# --- Verify gold image ---

- name: "FPP: Query gold image {{ fpp_gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query image
      -image {{ fpp_gold_image }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_image_query
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: Validate gold image exists
  ansible.builtin.assert:
    that: _fpp_image_query.rc == 0
    fail_msg: "FPP gold image '{{ fpp_gold_image }}' not found: {{ _fpp_image_query.stderr }}"

# --- Provision working copy ---

- name: Set working copy name
  ansible.builtin.set_fact:
    _fpp_wc_name: "{{ fpp_working_copy_name | default(fpp_gold_image ~ '_' ~ ansible_date_time.epoch, true) }}"

- name: "FPP: Check if working copy {{ _fpp_wc_name }} already exists"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _fpp_wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_check
  changed_when: false
  failed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "FPP: Add working copy {{ _fpp_wc_name }} from {{ fpp_gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl add workingcopy
      -workingcopy {{ _fpp_wc_name }}
      -image {{ fpp_gold_image }}
      -node {{ inventory_hostname }}
      {{ fpp_rhpctl_extra_args }}
    timeout: "{{ fpp_provision_timeout }}"
  register: _fpp_provision
  become_user: "{{ oracle_os_user }}"
  when: _fpp_wc_check.rc != 0

# --- Query working copy details ---

- name: "FPP: Query working copy path"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _fpp_wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_info
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: Extract new oracle_home path from working copy
  ansible.builtin.set_fact:
    _fpp_new_home_path: "{{ _fpp_wc_info.stdout | regex_search('Home Path:\\s*(.+)', '\\1') | first | trim }}"

# --- Pre-checks ---

- name: "Verify new oracle_home binaries"
  ansible.builtin.command:
    cmd: "{{ _fpp_new_home_path }}/OPatch/opatch lspatches"
  register: _fpp_opatch_check
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: Display patch level of new working copy
  ansible.builtin.debug:
    msg: "{{ _fpp_opatch_check.stdout_lines }}"

# --- Report for patch phase ---

- name: "PREPARE COMPLETE - Summary"
  ansible.builtin.debug:
    msg: |
      ============================================================
      FPP PREPARE COMPLETE
      ============================================================
      Working copy name:  {{ _fpp_wc_name }}
      New home path:      {{ _fpp_new_home_path }}
      Gold image:         {{ fpp_gold_image }}
      Target databases:   {{ _fpp_databases | map(attribute='db_name') | join(', ') }}
      Host:               {{ inventory_hostname }}

      To proceed with patching during the maintenance window, run:
        ansible-playbook playbooks/fpp_patch.yml \
          -e fpp_mode=patch \
          -e oracle_environment={{ oracle_environment }} \
          -e fpp_working_copy_name={{ _fpp_wc_name }} \
          -e oracle_home_old={{ oracle_home_old }} \
          -e oracle_home_new={{ oracle_home_new }}
      ============================================================

---
# FPP Patch phase - Run DURING the maintenance window.
#
# Iterates over each version family that needs patching:
#   1. Validates the working copy exists (from prepare phase)
#   2. Moves databases to the prepared working copy
#   3. Runs datapatch
#   4. Verifies databases on the new home
#   5. Exports facts for catalog_updater

- name: Validate patch inputs
  ansible.builtin.assert:
    that:
      - (fpp_working_copies is defined and fpp_working_copies | length > 0) or
        (fpp_working_copy_name is defined and fpp_working_copy_name | length > 0)
    fail_msg: >-
      Patch mode requires fpp_working_copies dict (per family) or
      fpp_working_copy_name (single family). These come from the prepare phase.

# Build fpp_working_copies from single fpp_working_copy_name if needed
- name: Normalize working copies to per-family dict
  ansible.builtin.set_fact:
    _fpp_working_copies: >-
      {{ fpp_working_copies | default(
           dict(_fpp_families | map('community.general.dict_kv', fpp_working_copy_name))
         ) }}
  when: _fpp_families | length > 0

- name: "Patch family: {{ _family }}"
  ansible.builtin.include_tasks: patch_one_family.yml
  loop: "{{ _fpp_families }}"
  loop_control:
    loop_var: _family

# --- Export facts for catalog_updater ---

- name: Set patching result facts
  ansible.builtin.set_fact:
    fpp_patched_databases: "{{ _fpp_patch_plan | map(attribute='db') | map(attribute='db_name') | list }}"
    fpp_patched_targets: "{{ _fpp_patched_targets | default({}) }}"
    cacheable: true

---
# oracle_fpp_patching - Orchestrate Oracle FPP (Fleet Patching and Provisioning)
#
# This role wraps rhpctl commands to:
#   1. Provision a new working copy from a gold image
#   2. Move databases from the old home to the new home
#   3. Run datapatch on moved databases
#
# Inputs (extra_vars):
#   - fpp_gold_image: FPP gold image name
#   - oracle_home_old: symbolic name of the current oracle_home
#   - oracle_home_new: symbolic name of the target oracle_home
#   - oracle_environment: dev | staging | prod
#
# Requires:
#   - catalog_loader to have run first (provides oracle_databases)
#   - rhpctl available on the target host (or FPP server)

- name: Validate FPP inputs
  ansible.builtin.assert:
    that:
      - fpp_gold_image | length > 0
      - oracle_home_old | length > 0
      - oracle_home_new | length > 0
      - oracle_homes[oracle_home_old] is defined
    fail_msg: >-
      oracle_fpp_patching requires fpp_gold_image, oracle_home_old,
      oracle_home_new. oracle_home_old must exist in oracle_homes dict.
  tags: [always]

- name: Resolve old oracle_home path
  ansible.builtin.set_fact:
    _fpp_old_home_path: "{{ oracle_home_old | resolve_oracle_home(oracle_homes) }}"

- name: Identify databases on old oracle_home for this host
  ansible.builtin.set_fact:
    _fpp_databases: >-
      {{ oracle_databases | default([])
         | selectattr('_oracle_home_path', 'equalto', _fpp_old_home_path)
         | list }}

- name: Display databases to be patched
  ansible.builtin.debug:
    msg: >-
      Will move {{ _fpp_databases | length }} database(s) from
      {{ oracle_home_old }} to {{ oracle_home_new }}:
      {{ _fpp_databases | map(attribute='db_name') | join(', ') }}

- name: Skip host if no databases to patch
  ansible.builtin.meta: end_host
  when: _fpp_databases | length == 0

# --- Phase 1: Verify gold image exists ---

- name: "FPP: Query gold image {{ fpp_gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query image
      -image {{ fpp_gold_image }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_image_query
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: Validate gold image exists
  ansible.builtin.assert:
    that: _fpp_image_query.rc == 0
    fail_msg: "FPP gold image '{{ fpp_gold_image }}' not found: {{ _fpp_image_query.stderr }}"

# --- Phase 2: Provision working copy (new oracle_home) ---

- name: Set working copy name
  ansible.builtin.set_fact:
    _fpp_wc_name: "{{ fpp_working_copy_name | default(fpp_gold_image ~ '_' ~ ansible_date_time.epoch, true) }}"

- name: "FPP: Check if working copy {{ _fpp_wc_name }} already exists"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _fpp_wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_check
  changed_when: false
  failed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "FPP: Add working copy {{ _fpp_wc_name }} from {{ fpp_gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl add workingcopy
      -workingcopy {{ _fpp_wc_name }}
      -image {{ fpp_gold_image }}
      -node {{ inventory_hostname }}
      {{ fpp_rhpctl_extra_args }}
    timeout: "{{ fpp_provision_timeout }}"
  register: _fpp_provision
  become_user: "{{ oracle_os_user }}"
  when: _fpp_wc_check.rc != 0

- name: "FPP: Query working copy path"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _fpp_wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_info
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: Extract new oracle_home path from working copy
  ansible.builtin.set_fact:
    _fpp_new_home_path: "{{ _fpp_wc_info.stdout | regex_search('Home Path:\\s*(.+)', '\\1') | first | trim }}"

- name: Report new oracle_home path
  ansible.builtin.debug:
    msg: "New oracle_home path: {{ _fpp_new_home_path }}"

# --- Phase 3: Move databases to new home ---

- name: "FPP: Move databases to new working copy"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl move database
      -sourcewc {{ oracle_home_old }}
      -destwc {{ _fpp_wc_name }}
      -dbname {{ _db.db_name }}
      {{ fpp_rhpctl_extra_args }}
    timeout: "{{ fpp_move_timeout }}"
  loop: "{{ _fpp_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  register: _fpp_move_results
  become_user: "{{ oracle_os_user }}"
  when: _db._is_first_node

# --- Phase 4: Datapatch ---

- name: "Run datapatch for moved databases"
  ibre5041.ansible_oracle_modules.oracle_datapatch:
    oracle_home: "{{ _fpp_new_home_path }}"
    db_name: "{{ _db.db_name }}"
  loop: "{{ _fpp_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  become_user: "{{ oracle_os_user }}"
  when:
    - fpp_run_datapatch | bool
    - _db._is_first_node

# --- Phase 5: Post-check ---

- name: "Verify databases are running on new oracle_home"
  ibre5041.ansible_oracle_modules.oracle_facts:
    mode: sysdba
    hostname: localhost
    service_name: "{{ _db.db_name }}"
    oracle_home: "{{ _fpp_new_home_path }}"
    database: true
    instance: true
    patch_level: true
  loop: "{{ _fpp_databases }}"
  loop_control:
    loop_var: _db
    label: "{{ _db.db_name }}"
  register: _fpp_post_facts
  become_user: "{{ oracle_os_user }}"
  when: _db._is_first_node

# --- Export facts for catalog_updater ---

- name: Set patching result facts
  ansible.builtin.set_fact:
    fpp_patched_databases: "{{ _fpp_databases | map(attribute='db_name') | list }}"
    fpp_new_home_path: "{{ _fpp_new_home_path }}"
    cacheable: true

---
# oracle_fpp_patching - Orchestrate Oracle FPP (Fleet Patching and Provisioning)
#
# Two modes controlled by fpp_mode:
#   prepare - Provision working copy from gold image, run pre-checks.
#             Can be run days/weeks before the maintenance window.
#   patch   - Move databases to the prepared working copy, datapatch,
#             post-checks. Run during the maintenance window.
#
# Inputs (extra_vars):
#   - fpp_mode: prepare | patch
#   - fpp_gold_image: FPP gold image name
#   - oracle_home_old: symbolic name of the current oracle_home
#   - oracle_home_new: symbolic name of the target oracle_home
#   - fpp_working_copy_name: (required for patch mode) name from prepare phase
#
# Requires:
#   - catalog_loader to have run first (provides oracle_databases)
#   - rhpctl available on the target host (or FPP server)

- name: Validate FPP mode
  ansible.builtin.assert:
    that:
      - fpp_mode in ['prepare', 'patch']
    fail_msg: "fpp_mode must be 'prepare' or 'patch', got '{{ fpp_mode }}'"
  tags: [always]

- name: "Run FPP {{ fpp_mode }} phase"
  ansible.builtin.include_tasks: "{{ fpp_mode }}.yml"

---
# Prepare one version family: provision working copy from gold image.
# Called from prepare.yml with loop_var: _family

- name: "{{ _family }}: Resolve target and gold image"
  ansible.builtin.set_fact:
    _target_home: "{{ oracle_home_targets[_family] }}"
    _gold_image: "{{ (_fpp_patch_plan | selectattr('family', 'equalto', _family) | first).gold_image }}"

- name: "{{ _family }}: Query gold image {{ _gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query image
      -image {{ _gold_image }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_image_query
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "{{ _family }}: Validate gold image exists"
  ansible.builtin.assert:
    that: _fpp_image_query.rc == 0
    fail_msg: "FPP gold image '{{ _gold_image }}' not found: {{ _fpp_image_query.stderr }}"

# --- Provision working copy ---

- name: "{{ _family }}: Set working copy name"
  ansible.builtin.set_fact:
    _wc_name: >-
      {{ (fpp_working_copies | default({}))[_family]
         | default(fpp_working_copy_name if (fpp_working_copy_name | length > 0 and _fpp_families | length == 1) else '')
         | default(_target_home ~ '_' ~ (inventory_hostname_short | default(inventory_hostname)), true) }}

- name: "{{ _family }}: Check if working copy {{ _wc_name }} already exists"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_check
  changed_when: false
  failed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "{{ _family }}: Add working copy {{ _wc_name }} from {{ _gold_image }}"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl add workingcopy
      -workingcopy {{ _wc_name }}
      -image {{ _gold_image }}
      -node {{ inventory_hostname }}
      {{ fpp_rhpctl_extra_args }}
    timeout: "{{ fpp_provision_timeout }}"
  become_user: "{{ oracle_os_user }}"
  when: _fpp_wc_check.rc != 0

# --- Query and verify ---

- name: "{{ _family }}: Query working copy path"
  ansible.builtin.command:
    cmd: >-
      {{ fpp_server_home }}/bin/rhpctl query workingcopy
      -workingcopy {{ _wc_name }}
      {{ fpp_rhpctl_extra_args }}
  register: _fpp_wc_info
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "{{ _family }}: Extract oracle_home path"
  ansible.builtin.set_fact:
    _new_home_path: "{{ _fpp_wc_info.stdout | regex_search('Home Path:\\s*(.+)', '\\1') | first | trim }}"

- name: "{{ _family }}: Verify binaries"
  ansible.builtin.command:
    cmd: "{{ _new_home_path }}/OPatch/opatch lspatches"
  register: _fpp_opatch_check
  changed_when: false
  become_user: "{{ oracle_os_user }}"

- name: "{{ _family }}: Patch level"
  ansible.builtin.debug:
    msg: "{{ _fpp_opatch_check.stdout_lines }}"

# --- Register working copy name for summary and patch phase ---

- name: "{{ _family }}: Register working copy"
  ansible.builtin.set_fact:
    _fpp_working_copies: "{{ _fpp_working_copies | default({}) | combine({_family: _wc_name}) }}"
    _fpp_home_paths: "{{ _fpp_home_paths | default({}) | combine({_family: _new_home_path}) }}"

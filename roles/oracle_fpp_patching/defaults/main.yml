---
# FPP Patching role defaults

# Operating mode: prepare | patch
#   prepare: provision working copy + pre-checks (can run days before maintenance)
#   patch:   move databases to the prepared working copy + datapatch + post-checks
fpp_mode: ""

# FPP server ORACLE_HOME (where rhpctl lives)
fpp_server_home: ""

# FPP gold image naming convention.
# Gold image name is derived per family target:
#   {{ target_home_name }}{{ fpp_gold_image_suffix }}
# Override per-family with fpp_gold_images dict if conventions differ.
fpp_gold_image_suffix: "{{ fpp_gold_image_suffix }}"

# Optional: override gold image names per family (bypasses convention)
# fpp_gold_images:
#   19c: custom_19c_image_name
#   26ai: custom_26ai_image_name

# Name for the new working copy (FPP provisioned home).
# In prepare mode: if empty, auto-generated per family target + hostname.
# In patch mode: MUST be set (maps to the working copy from prepare).
# For multi-family patching, use fpp_working_copies dict instead.
fpp_working_copy_name: ""

# Optional: working copies per family (for patching multiple families at once)
# fpp_working_copies:
#   19c: db_19_23_oradev-node-1
#   26ai: db_26ai_1_oradev-node-1

# Run datapatch after moving databases (default: true)
fpp_run_datapatch: true

# Additional rhpctl options (free-form string appended to commands)
fpp_rhpctl_extra_args: ""

# Timeout in seconds for rhpctl operations
fpp_provision_timeout: 3600
fpp_move_timeout: 7200

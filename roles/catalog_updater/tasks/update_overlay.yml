---
# Update overlay files for databases in one patched family.
# Called from main.yml with:
#   _family: version family (e.g., "19c")
#   _target_home: target oracle_home name (e.g., "db_19_23")
#   _family_databases: list of database names patched in this family

- name: "{{ _family }}: Update overlay for {{ _db_name }}"
  ansible.builtin.include_tasks: update_one_overlay.yml
  loop: "{{ _family_databases }}"
  loop_control:
    loop_var: _db_name

---
# catalog_updater - Update catalog files after patching.
#
# This role runs on localhost and:
#   1. Creates/updates overlay files for each patched database
#      (sets oracle_home to the family's target home)
#   2. Commits and pushes changes to git
#
# Supports multiple families patched in a single run.

- name: Validate catalog_updater inputs
  ansible.builtin.assert:
    that:
      - catalog_updater_patched_targets | length > 0
      - catalog_updater_target_env in ['dev', 'staging', 'prod']
      - catalog_updater_databases | length > 0
    fail_msg: >-
      catalog_updater requires patched_targets (from FPP role),
      target_env, and a non-empty databases list.
  tags: [always]

# --- Update overlay files for each family ---

- name: Ensure overlay directory exists
  ansible.builtin.file:
    path: "{{ catalog_updater_catalog_dir }}/overlays/{{ catalog_updater_target_env }}"
    state: directory
    mode: "0755"

- name: Update overlays for each patched family
  ansible.builtin.include_tasks: update_overlay.yml
  loop: "{{ catalog_updater_patched_targets | dict2items }}"
  loop_control:
    loop_var: _family_result
    label: "{{ _family_result.key }}"
  vars:
    _family: "{{ _family_result.key }}"
    _target_home: "{{ _family_result.value.target_home }}"
    _family_databases: "{{ _family_result.value.databases }}"

# --- Git commit and push ---

- name: Check for changes
  ansible.builtin.command:
    cmd: git status --porcelain
    chdir: "{{ catalog_updater_repo_root }}"
  register: _git_status
  changed_when: false

- name: Commit catalog updates
  when:
    - catalog_updater_git_commit | bool
    - _git_status.stdout | length > 0
  block:
    - name: Stage changed files
      ansible.builtin.command:
        cmd: git add databases/overlays/
        chdir: "{{ catalog_updater_repo_root }}"

    - name: Build commit message
      ansible.builtin.set_fact:
        _commit_msg: >-
          auto: patch {{ catalog_updater_target_env }} databases
          {% for family, result in catalog_updater_patched_targets.items() %}

          {{ family }}: {{ result.databases | join(', ') }} → {{ result.target_home }}
          {% endfor %}

    - name: Commit changes
      ansible.builtin.command:
        cmd: "git commit -m '{{ _commit_msg }}'"
        chdir: "{{ catalog_updater_repo_root }}"

- name: Push changes
  ansible.builtin.command:
    cmd: >-
      git push {{ catalog_updater_git_remote }}
      {{ catalog_updater_git_branch | default('HEAD', true) }}
    chdir: "{{ catalog_updater_repo_root }}"
  when:
    - catalog_updater_git_push | bool
    - _git_status.stdout | length > 0

---
# catalog_updater - Set desired oracle_home in database overlays.
#
# This role is a standalone utility used by external planning systems
# (or manually by DBAs) to declare which oracle_home a database should
# run on, per environment. It updates overlay files and commits/pushes.
#
# In the desired-state model, overlays are set BEFORE patching.
# The FPP patching role then converges actual → desired.
#
# Example workflow:
#   1. DBA/planner runs catalog_updater to set oracle_home: db_19_23
#      in overlays/dev/APPDB1.yml
#   2. DBA runs fpp_patch.yml → FPP moves APPDB1 to db_19_23
#   3. Later, repeat for staging, then prod

# Databases to update (list of dicts: {db_name, oracle_home})
# Example:
#   catalog_updater_updates:
#     - { db_name: APPDB1, oracle_home: db_19_23 }
#     - { db_name: APPDB2, oracle_home: db_19_23 }
#     - { db_name: AIDB1,  oracle_home: db_26ai_1 }
catalog_updater_updates: []

# Environment to update overlays for
catalog_updater_target_env: "{{ oracle_environment | default('') }}"

# Path to the repo root
catalog_updater_repo_root: "{{ playbook_dir }}/.."

# Path to the database catalog directory
catalog_updater_catalog_dir: "{{ catalog_updater_repo_root }}/databases"

# Path to oracle_defaults.yml
catalog_updater_oracle_defaults_file: "{{ catalog_updater_repo_root }}/inventory/group_vars/all/oracle_defaults.yml"

# Git settings
catalog_updater_git_commit: true
catalog_updater_git_push: true
catalog_updater_git_remote: origin
catalog_updater_git_branch: ""              # Empty = current branch

---
# catalog_updater - Defaults for automatic catalog updates after patching.
#
# This role updates the repo to reflect state changes made by external
# tools (FPP, manual patching, etc.) and commits the changes.
# Supports multiple version families patched in a single run.

# Per-family patching results (auto-populated by oracle_fpp_patching)
# Dict keyed by family, each value has: target_home, home_path, databases
# Example:
#   fpp_patched_targets:
#     19c:
#       target_home: db_19_23
#       home_path: /oracle/u01/product/19.23.0.0
#       databases: [APPDB1, APPDB2]
#     26ai:
#       target_home: db_26ai_1
#       home_path: /oracle/u01/product/26.1.0.0
#       databases: [AIDB1]
catalog_updater_patched_targets: "{{ fpp_patched_targets | default({}) }}"

# Target home targets dict (from group_vars)
catalog_updater_home_targets: "{{ oracle_home_targets | default({}) }}"

# Environment that was patched (from inventory group_vars)
catalog_updater_target_env: "{{ oracle_environment | default('') }}"

# List of all patched database names (auto-populated)
catalog_updater_databases: "{{ fpp_patched_databases | default([]) }}"

# Path to the repo root
catalog_updater_repo_root: "{{ playbook_dir }}/.."

# Path to the database catalog directory
catalog_updater_catalog_dir: "{{ catalog_updater_repo_root }}/databases"

# Path to oracle_defaults.yml
catalog_updater_oracle_defaults_file: "{{ catalog_updater_repo_root }}/inventory/group_vars/all/oracle_defaults.yml"

# Git settings
catalog_updater_git_commit: true
catalog_updater_git_push: true
catalog_updater_git_remote: origin
catalog_updater_git_branch: ""              # Empty = current branch

---
- name: Create Oracle Database
  hosts: all
  collections:
    - ibre5041.ansible_oracle_modules
  become: true
  any_errors_fatal: true

  pre_tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - target_db is defined
        fail_msg: "Required: target_db"

  roles:
    - role: catalog_loader
    - role: oracle_database

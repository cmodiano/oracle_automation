---
# FPP Patching Playbook - Two-phase patching workflow
#
# Phase 1: PREPARE (run days/weeks before maintenance window)
#   - Provisions a new working copy from a gold image
#   - Runs pre-checks (binaries, patch level)
#   - No database downtime
#   - Outputs the working copy name for the patch phase
#
# Phase 2: PATCH (run during maintenance window)
#   - Moves databases to the prepared working copy
#   - Runs datapatch
#   - Verifies databases on the new home
#   - Updates catalog overlays and commits to git
#
# Variables resolved automatically from group_vars:
#   oracle_environment:   from inventory group_vars (host group membership)
#   oracle_home_target:   from group_vars/all/oracle_defaults.yml
#   fpp_gold_image:       derived from oracle_home_target + fpp_gold_image_suffix
#
# Required extra_vars:
#   fpp_mode:  prepare | patch
#
# Required extra_vars (patch only):
#   fpp_working_copy_name:  working copy created during prepare phase
#
# Optional extra_vars:
#   target_db:                restrict to a single database
#   fpp_working_copy_name:    custom name (overrides auto-generated in prepare)
#   fpp_gold_image:           override derived gold image name
#   fpp_run_datapatch:        true/false (default: true)
#   catalog_updater_git_push: true/false (default: true)
#
# Examples:
#
#   # PREPARE - zero extra_vars beyond fpp_mode:
#   ansible-playbook playbooks/fpp_patch.yml -l dev \
#     -e fpp_mode=prepare
#
#   # PATCH - only needs the working copy name from prepare output:
#   ansible-playbook playbooks/fpp_patch.yml -l dev \
#     -e fpp_mode=patch \
#     -e fpp_working_copy_name=db_19_23_oradev-node-1

- name: "FPP {{ fpp_mode | default('unknown') | upper }} - {{ oracle_environment | default('unknown') }}"
  hosts: all
  collections:
    - ibre5041.ansible_oracle_modules
  become: true
  serial: 1                          # Rolling: one node at a time for RAC
  any_errors_fatal: true

  pre_tasks:
    - name: Validate required inputs
      ansible.builtin.assert:
        that:
          - fpp_mode is defined
          - fpp_mode in ['prepare', 'patch']
        fail_msg: "Required: fpp_mode (prepare|patch)"

    - name: Validate patch-specific inputs
      ansible.builtin.assert:
        that:
          - fpp_working_copy_name is defined and fpp_working_copy_name | length > 0
        fail_msg: "Patch mode requires fpp_working_copy_name (from prepare phase)"
      when: fpp_mode == 'patch'

  roles:
    - role: catalog_loader
      tags: [always]

    - role: oracle_fpp_patching
      tags: [fpp, patching]

- name: "Update catalog after FPP patching"
  hosts: localhost
  connection: local
  become: false
  gather_facts: true               # needed for ansible_date_time
  when: fpp_mode == 'patch'        # only update catalog after actual patching

  roles:
    - role: catalog_updater
      tags: [catalog, update]

---
# FPP Patching Playbook - Two-phase patching workflow
#
# Supports multiple version families in parallel (19c, 21c, 26ai, etc.).
# Each database's target is resolved from oracle_home_targets in group_vars.
#
# Phase 1: PREPARE (run days/weeks before maintenance window)
#   - Provisions working copies from gold images (one per family)
#   - Runs pre-checks
#   - No database downtime
#   - Outputs working copy names for the patch phase
#
# Phase 2: PATCH (run during maintenance window)
#   - Moves databases to prepared working copies
#   - Runs datapatch
#   - Verifies databases on new homes
#   - Updates catalog overlays and commits to git
#
# Everything is derived from group_vars:
#   oracle_environment:    from host group membership
#   oracle_home_targets:   target home per version family
#   fpp_gold_image:        derived from target home + fpp_gold_image_suffix
#
# Required extra_vars:
#   fpp_mode:  prepare | patch
#
# Required extra_vars (patch only):
#   fpp_working_copies:  dict of {family: working_copy_name} from prepare
#   OR fpp_working_copy_name: single name (when only one family)
#
# Examples:
#
#   # PREPARE - zero extra_vars:
#   ansible-playbook playbooks/fpp_patch.yml -l dev -e fpp_mode=prepare
#
#   # PATCH - single family:
#   ansible-playbook playbooks/fpp_patch.yml -l dev \
#     -e fpp_mode=patch \
#     -e fpp_working_copy_name=db_19_23_oradev-node-1
#
#   # PATCH - multiple families:
#   ansible-playbook playbooks/fpp_patch.yml -l dev \
#     -e fpp_mode=patch \
#     -e '{"fpp_working_copies": {"19c": "db_19_23_oradev-node-1", "26ai": "db_26ai_1_oradev-node-1"}}'

- name: "FPP {{ fpp_mode | default('unknown') | upper }} - {{ oracle_environment | default('unknown') }}"
  hosts: all
  collections:
    - ibre5041.ansible_oracle_modules
  become: true
  serial: 1                          # Rolling: one node at a time for RAC
  any_errors_fatal: true

  pre_tasks:
    - name: Validate required inputs
      ansible.builtin.assert:
        that:
          - fpp_mode is defined
          - fpp_mode in ['prepare', 'patch']
        fail_msg: "Required: fpp_mode (prepare|patch)"

    - name: Validate patch-specific inputs
      ansible.builtin.assert:
        that:
          - (fpp_working_copies is defined and fpp_working_copies | length > 0) or
            (fpp_working_copy_name is defined and fpp_working_copy_name | length > 0)
        fail_msg: "Patch mode requires fpp_working_copies dict or fpp_working_copy_name"
      when: fpp_mode == 'patch'

  roles:
    - role: catalog_loader
      tags: [always]

    - role: oracle_fpp_patching
      tags: [fpp, patching]

- name: "Update catalog after FPP patching"
  hosts: localhost
  connection: local
  become: false
  gather_facts: true               # needed for ansible_date_time
  when: fpp_mode == 'patch'        # only update catalog after actual patching

  roles:
    - role: catalog_updater
      tags: [catalog, update]
